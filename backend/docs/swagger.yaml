basePath: /api/v1
definitions:
  github_com_AbelHaro_url-shortener_backend_internal_domain.URL:
    properties:
      created_at:
        type: string
      id:
        type: string
      original_url:
        type: string
      short_code:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  github_com_AbelHaro_url-shortener_backend_internal_dtos.V1CreateShortenRequest:
    properties:
      original_url:
        type: string
    required:
    - original_url
    type: object
  github_com_AbelHaro_url-shortener_backend_internal_dtos.V1ErrorResponse:
    properties:
      error:
        type: string
    type: object
  github_com_AbelHaro_url-shortener_backend_internal_dtos.V1LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  github_com_AbelHaro_url-shortener_backend_internal_dtos.V1RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  github_com_AbelHaro_url-shortener_backend_internal_dtos.V1RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  github_com_AbelHaro_url-shortener_backend_internal_dtos.V1SearchByOriginalURLRequest:
    properties:
      url:
        type: string
    required:
    - url
    type: object
  github_com_AbelHaro_url-shortener_backend_internal_dtos.V1TokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  github_com_AbelHaro_url-shortener_backend_internal_dtos.V1URLResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      original_url:
        type: string
      short_code:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  github_com_AbelHaro_url-shortener_backend_internal_dtos.V1UserResponse:
    properties:
      email:
        type: string
      id:
        type: string
    type: object
  internal_delivery_http_health.Response:
    properties:
      status:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for shortening URLs
  title: URL Shortener API
  version: "1.0"
paths:
  /{shortURL}:
    get:
      description: Redirects a shortened URL to its original URL
      parameters:
      - description: Short URL
        in: path
        name: shortURL
        required: true
        type: string
      responses:
        "301":
          description: Moved Permanently
      summary: Redirect to original URL
      tags:
      - URLs
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with email and password, returns access and refresh
        tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1ErrorResponse'
      summary: Login user
      tags:
      - Auth
  /auth/logout:
    post:
      description: Invalidate all refresh tokens for the authenticated user
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Use refresh token to get a new access token and refresh token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1ErrorResponse'
      summary: Refresh access token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account with email and password
      parameters:
      - description: Registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1ErrorResponse'
      summary: Register a new user
      tags:
      - Auth
  /health:
    get:
      description: Returns the health status of the API
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_delivery_http_health.Response'
      summary: Health check
      tags:
      - Health
  /shorten:
    post:
      consumes:
      - application/json
      description: Create a shortened URL from a long URL
      parameters:
      - description: Request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1CreateShortenRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1URLResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1ErrorResponse'
      summary: Shorten a URL
      tags:
      - URLs
  /urls/{id}:
    delete:
      description: Delete a URL by its ID
      parameters:
      - description: URL ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1ErrorResponse'
      summary: Delete URL
      tags:
      - URLs
    get:
      description: Retrieve a URL by its ID
      parameters:
      - description: URL ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_domain.URL'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1ErrorResponse'
      summary: Get URL by ID
      tags:
      - URLs
  /urls/search:
    post:
      consumes:
      - application/json
      description: Find a shortened URL by its original URL
      parameters:
      - description: Request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1SearchByOriginalURLRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_domain.URL'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1ErrorResponse'
      summary: Search URL by original URL
      tags:
      - URLs
  /urls/short/{shortCode}:
    get:
      description: Retrieve a URL by its short code
      parameters:
      - description: Short Code
        in: path
        name: shortCode
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_domain.URL'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_AbelHaro_url-shortener_backend_internal_dtos.V1ErrorResponse'
      summary: Get URL by short code
      tags:
      - URLs
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
tags:
- description: Operations with URLs
  name: URLs
- description: Authentication and token management
  name: Auth
- description: Health check
  name: Health
