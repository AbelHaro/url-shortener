basePath: /api/v1
definitions:
  auth.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  auth.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  auth.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  auth.TokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  auth.UserResponse:
    properties:
      email:
        type: string
      id:
        type: string
    type: object
  domain.URL:
    properties:
      created_at:
        type: string
      id:
        type: string
      original_url:
        type: string
      short_code:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  dtos.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  dtos.V1AllocateRangeResponse:
    properties:
      current_offset:
        type: integer
      id:
        type: string
      last:
        type: integer
      start:
        type: integer
    type: object
  dtos.V1CreateShortenRequest:
    properties:
      original_url:
        type: string
    required:
    - original_url
    type: object
  dtos.V1SearchByOriginalURLRequest:
    properties:
      url:
        type: string
    required:
    - url
    type: object
  health.Response:
    properties:
      status:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for shortening URLs
  title: URL Shortener API
  version: "1.0"
paths:
  /{shortURL}:
    get:
      description: Redirects a shortened URL to its original URL
      parameters:
      - description: Short URL
        in: path
        name: shortURL
        required: true
        type: string
      responses:
        "301":
          description: Moved Permanently
      summary: Redirect to original URL
      tags:
      - URLs
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with email and password, returns access and refresh
        tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
      summary: Login user
      tags:
      - Auth
  /auth/logout:
    post:
      description: Invalidate all refresh tokens for the authenticated user
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Use refresh token to get a new access token and refresh token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
      summary: Refresh access token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account with email and password
      parameters:
      - description: Registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/auth.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auth.ErrorResponse'
      summary: Register a new user
      tags:
      - Auth
  /health:
    get:
      description: Returns the health status of the API
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/health.Response'
      summary: Health check
      tags:
      - Health
  /ranges/{id}/offset:
    put:
      consumes:
      - application/json
      description: Update the offset of a range
      parameters:
      - description: Range ID
        in: path
        name: id
        required: true
        type: string
      - description: New offset value
        in: query
        name: offset
        required: true
        type: integer
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Update the offset of a range. Given a range of 100_000, if the offset
        is 1_000, each 1_000 numbers incremented in the range will be marked as used.
        So if the offset is 1_000, the first 1_000 numbers in the range will be marked
        as used, this is useful to not loose IDs in case of a failure in the URL shortening
        service, so the next time the service is restarted, it can continue from the
        last offset instead of starting from the beginning of the range avoiding to
        loose IDs.
      tags:
      - Range Allocation
  /ranges/allocate:
    post:
      consumes:
      - application/json
      description: Allocate a range of IDs for URL shortening
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.V1AllocateRangeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Allocate a range of IDs
      tags:
      - Range Allocation
  /shorten:
    post:
      consumes:
      - application/json
      description: Create a shortened URL from a long URL
      parameters:
      - description: Request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtos.V1CreateShortenRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.URL'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Shorten a URL
      tags:
      - URLs
  /urls/{id}:
    delete:
      description: Delete a URL by its ID
      parameters:
      - description: URL ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Delete URL
      tags:
      - URLs
    get:
      description: Retrieve a URL by its ID
      parameters:
      - description: URL ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.URL'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Get URL by ID
      tags:
      - URLs
  /urls/search:
    post:
      consumes:
      - application/json
      description: Find a shortened URL by its original URL
      parameters:
      - description: Request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtos.V1SearchByOriginalURLRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.URL'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Search URL by original URL
      tags:
      - URLs
  /urls/short/{shortCode}:
    get:
      description: Retrieve a URL by its short code
      parameters:
      - description: Short Code
        in: path
        name: shortCode
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.URL'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Get URL by short code
      tags:
      - URLs
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
tags:
- description: Operations with URLs
  name: URLs
- description: Authentication and token management
  name: Auth
- description: Health check
  name: Health
