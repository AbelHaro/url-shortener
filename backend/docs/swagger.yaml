basePath: /api/v1
definitions:
  domain.URL:
    properties:
      created_at:
        type: string
      id:
        type: string
      original_url:
        type: string
      short_code:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  dtos.AuthResponse:
    properties:
      tokens:
        $ref: '#/definitions/dtos.TokenResponse'
      user:
        $ref: '#/definitions/dtos.UserResponse'
    type: object
  dtos.CreateShortenRequest:
    properties:
      original_url:
        type: string
    required:
    - original_url
    type: object
  dtos.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  dtos.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dtos.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dtos.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dtos.SearchByOriginalURLRequest:
    properties:
      original_url:
        type: string
    required:
    - original_url
    type: object
  dtos.SessionResponse:
    properties:
      user:
        $ref: '#/definitions/dtos.UserResponse'
    type: object
  dtos.TokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  dtos.URLResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      original_url:
        type: string
      short_code:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    required:
    - created_at
    - id
    - original_url
    - short_code
    - updated_at
    - user_id
    type: object
  dtos.UserResponse:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  health.Response:
    properties:
      status:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for shortening URLs
  title: URL Shortener API
  version: "1.0"
paths:
  /{shortURL}:
    get:
      description: Redirects a shortened URL to its original URL
      operationId: getRedirect
      parameters:
      - description: Short URL
        in: path
        name: shortURL
        required: true
        type: string
      responses:
        "301":
          description: Moved Permanently
      summary: Redirect to original URL
      tags:
      - URLs
  /auth/anonymous:
    post:
      consumes:
      - application/json
      description: Create a new anonymous account with a random name
      operationId: postAuthAnonymousRegister
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dtos.AuthResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Register anonymous user
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with email and password, returns access and refresh
        tokens
      operationId: postAuthLogin
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtos.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Login user
      tags:
      - Auth
  /auth/logout:
    post:
      description: Invalidate all refresh tokens for the authenticated user
      operationId: postAuthLogout
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - Auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Use refresh token to get a new access token and refresh token
      operationId: postAuthRefresh
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtos.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Refresh access token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account with email and password
      operationId: postAuthRegister
      parameters:
      - description: Registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtos.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dtos.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Register a new user
      tags:
      - Auth
  /auth/session:
    get:
      description: Returns the current authenticated user
      operationId: getAuthSession
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.SessionResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Current session
      tags:
      - Auth
  /health:
    get:
      description: Returns the health status of the API
      operationId: getHealth
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/health.Response'
      summary: Health check
      tags:
      - Health
  /shorten:
    post:
      consumes:
      - application/json
      description: Create a shortened URL from a long URL
      operationId: postShortenURL
      parameters:
      - description: Request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtos.CreateShortenRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dtos.URLResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Shorten a URL
      tags:
      - URLs
  /urls/{id}:
    delete:
      description: Delete a URL by its ID
      operationId: deleteURLByID
      parameters:
      - description: URL ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Delete URL
      tags:
      - URLs
    get:
      description: Retrieve a URL by its ID
      operationId: getURLByID
      parameters:
      - description: URL ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.URL'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Get URL by ID
      tags:
      - URLs
  /urls/search:
    post:
      consumes:
      - application/json
      description: Find a shortened URL by its original URL
      operationId: postURLsSearch
      parameters:
      - description: Request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtos.SearchByOriginalURLRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.URL'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Search URL by original URL
      tags:
      - URLs
  /urls/short/{shortCode}:
    get:
      description: Retrieve a URL by its short code
      operationId: getURLByShortCode
      parameters:
      - description: Short Code
        in: path
        name: shortCode
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.URL'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      summary: Get URL by short code
      tags:
      - URLs
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
tags:
- description: Operations with URLs
  name: URLs
- description: Authentication and token management
  name: Auth
- description: Health check
  name: Health
